name: Auto Run Help

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Backend Service
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          # 既然是 pnpm 项目，我们尝试用它 package.json 里定义的启动命令
          # 通常这类项目可以用 pnpm run start 或者 pnpm run dev
          pnpm run start || pnpm run dev || node server/app.mjs || echo "启动失败"
