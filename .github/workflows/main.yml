name: Auto Run Help

on:
  schedule:
    # 这里的 cron 表达式意思是每 2 小时运行一次
    - cron: '0 */2 * * *'
  workflow_dispatch: # 这是一个开关，让你能在网页上点按钮手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Backend Script
        env:
          # 这里的 TOKEN 对应你刚才在 Settings 里设置的那个名字
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          # 重点：这里需要指向你项目里具体的后端启动文件
          # 如果你的启动文件在 server 文件夹里，请根据实际文件名修改
          python source/main.py
