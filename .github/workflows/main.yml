name: Auto Run Help

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Backend Service
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          # 我们直接跳过前端界面，运行它的后端核心文件
          # 尝试运行这个项目真正干活的脚本
          node server/main.mjs || node server/app.mjs || node server/server.js
