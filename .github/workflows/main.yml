name: Auto Run Help

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Backend Service
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          # 尝试运行项目的后端逻辑
          # 注意：这里我们尝试直接运行 server 下的启动脚本
          node server/index.js || node server/app.js || echo "未找到启动文件"
